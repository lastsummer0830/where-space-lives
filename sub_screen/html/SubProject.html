<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout 틀</title>
    <link rel="stylesheet" href="../css/SubProjectStyle.css" />
    <script></script>
  </head>
  <body>
    <!-- nav -->
    <nav class="hero">
      <div class="hero__content">
        <h1 class="hero__title">우드의 결을 담다</h1>
        <p class="hero__desc">공간을 더 따뜻하게 만드는 가구 컬렉션</p>
      </div>
    </nav>
    <!-- main -->
    <main>
      <section class="section3">
        <div class="section-3">
          <div class="section3-stack">
            <div class="section3-img1"></div>
            <div class="section3-img2"></div>
          </div>
          <div class="section3-text-wrap">
            <h2 class="section3-title">햇살이 머무는 우드 컬렉션</h2>
            <p class="section3-text">
              자연스러운 결, 부드러운 곡선. 공간에 편안한 온도를 더하는 가구를
              소개합니다.
            </p>
          </div>
        </div>
      </section>
      <section class="section4">
        <div class="section-4">
          <div class="section4-text-wrap">
            <h2 class="section4-title">미니멀 우드 베드사이드 테이블</h2>
            <p class="section4-text">
              상단 수납과 오픈 선반으로 작은 공간도 깔끔하게 정리됩니다.
            </p>
          </div>
          <div class="section4-img"></div>
        </div>
      </section>
      <section class="section5">
        <div class="section-5">
          <div class="section5-top">
            <div class="section5-img1"></div>
            <div class="section5-text-wrap">
              <h2 class="section5-title">햇살을 담은 우드 사이드보드</h2>
              <p class="section5-text">
                우드의 결을 살린 따뜻한 톤으로 공간을 차분하게 완성해줍니다.<br />
                오래 두고 싶은 기본을 만나보세요.
              </p>
            </div>
          </div>
          <div class="section5-bottom">
            <div class="section5-img2"></div>
            <div class="section5-img3"></div>
            <div class="section5-img4"></div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
