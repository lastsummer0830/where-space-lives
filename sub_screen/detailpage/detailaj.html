<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="stylesheet" href="detailaj.css" />
    <script src="./product.js"></script>
  </head>
  <body>
    <main>
      <section class="product-gallery">
        <div class="galleryimg-list">
          <button class="detailimg active" onclick="changeImage(0)">
            <img src="https://www.ikea.com/kr/ko/images/products/fjaederharv-storage-box-with-lid-white__1396179_pe967200_s5.jpg?f=xl" alt="제품 상세 1" />
          </button>
          <button class="detailimg" onclick="changeImage(1)">
            <img src="image2.jpg" alt="제품 상세 2" />
          </button>
          <button class="detailimg" onclick="changeImage(2)">
            <img src="image3.jpg" alt="제품 상세 3" />
          </button>
          <button class="detailimg" onclick="changeImage(3)">
            <img src="image4.jpg" alt="제품 상세 4" />

          <button class="detailimg" onclick="changeImage(4)">
            <img src="image5.jpg" alt="제품 상세 5" />

            <img src="image6.jpg" alt="제품 상세 6" />
          </button>
        </div>

        <div class="main-display">
          <div class="slider-track" id="sliderTrack">

            <img src="image2.jpg" alt="메인 2" />
            <img src="image3.jpg" alt="메인 3" />
            <img src="image4.jpg" alt="메인 4" />
            <img src="image5.jpg" alt="메인 5" />
            <img src="image6.jpg" alt="메인 6" />
          </div>

          <button class="nav-btn prev" onclick="moveSlide(-1)">
            <span>&#10094;</span>
          </button>
          <button class="nav-btn next" onclick="moveSlide(1)">
            <span>&#10095;</span>
          </button>
        </div>

        
      </section>
    </main>
  </body>
</html>
